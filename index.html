<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MI6 Intelligence | Operation: Ghost</title>
    
    <!-- Fonts: Cinzel for elegance, Inter for clean UI, JetBrains Mono for Intel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgBase: '#050b14',      /* Deep Midnight */
                        surface: '#0a1220',     /* Glass Surface */
                        borderLight: '#1e293b', /* Slate Border */
                        gold: '#d4af37',        /* MI6 Gold */
                        silver: '#e2e8f0',      /* Bright Silver */
                        muted: '#64748b',       /* Text Muted */
                        danger: '#991b1b',      /* Crimson Alert */
                        success: '#059669'      /* Emerald Success */
                    },
                    fontFamily: {
                        elegant: ['"Cinzel"', 'serif'],
                        ui: ['"Inter"', 'sans-serif'],
                        code: ['"JetBrains Mono"', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        html { font-size: 18px; }
        @media (min-width: 1280px) { html { font-size: 20px; } }
        @media (min-width: 1536px) { html { font-size: 22px; } }

        body { 
            background-color: #050b14; 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(5, 11, 20, 0.75), rgba(5, 11, 20, 0.90)),
                url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(10, 18, 32, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gold-border { border-color: rgba(212, 175, 55, 0.3); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.5); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes damageShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        .damage-shake { animation: damageShake 0.4s ease-in-out; }
        
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(212, 175, 55, 0.1); opacity: 0.5; animation: scanline 8s linear infinite; pointer-events: none; z-index: 50; }

        /* Interactive Elements */
        .mi6-btn {
            background: transparent;
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.5);
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .mi6-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            transition: all 0.5s ease;
        }
        .mi6-btn:hover::before { left: 100%; }
        .mi6-btn:hover { background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .mi6-btn:active { transform: scale(0.98); }

        .vocab-word { color: #d4af37; cursor: pointer; border-bottom: 1px dashed #d4af37; transition: all 0.2s; font-weight: 600; }
        .vocab-word:hover { background: rgba(212, 175, 55, 0.1); }

        .bug-word { color: #991b1b; cursor: pointer; border-bottom: 1px dashed #991b1b; transition: all 0.2s; font-weight: 600; }
        .bug-word:hover { background: rgba(153, 27, 27, 0.1); }
        .bug-word.solved { color: #059669; border-color: #059669; pointer-events: none; }

        /* Teacher Drawer */
        .teacher-drawer { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: #050b14; z-index: 200; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid rgba(212, 175, 55, 0.3); box-shadow: -10px 0 40px rgba(0,0,0,0.8); }
        .teacher-drawer.open { right: 0; }
    </style>
</head>
<body class="flex flex-col h-screen select-none">
    
    <div class="scanline"></div>

    <!-- Initialization Screen -->
    <div id="loading-screen" class="fixed inset-0 z-[1000] bg-bgBase flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="w-32 h-32 rounded-full border border-gold/30 flex items-center justify-center mb-8 relative">
            <div class="absolute inset-0 rounded-full border border-gold/10 animate-ping"></div>
            <i class="fa-solid fa-chess-knight text-5xl text-gold"></i>
        </div>
        <h1 class="font-elegant text-4xl md:text-6xl text-silver tracking-[0.3em] mb-4 uppercase text-center">Operation: Ghost</h1>
        <p class="font-code text-muted tracking-widest mb-12 uppercase text-xs">Level A1 • Intelligence Division</p>
        <button onclick="initApp()" class="mi6-btn px-12 py-4 rounded text-sm">Initiate Protocol</button>
    </div>

    <!-- Notifications & Overlays -->
    <div id="damage-overlay" class="fixed inset-0 z-[800] bg-danger/10 border-8 border-danger/30 opacity-0 pointer-events-none transition-opacity duration-200"></div>
    
    <div id="notification-card" class="fixed top-8 left-1/2 -translate-x-1/2 z-[900] bg-gold text-bgBase px-10 py-4 rounded shadow-[0_10px_40px_rgba(212,175,55,0.3)] opacity-0 transform -translate-y-full transition-all duration-500 flex items-center gap-4">
        <i class="fa-solid fa-circle-check text-2xl"></i>
        <div>
            <h3 id="notif-title" class="font-elegant font-bold tracking-widest uppercase text-lg leading-tight">Intel Verified</h3>
            <p id="notif-msg" class="font-ui text-xs font-bold uppercase opacity-80">Good work, agent.</p>
        </div>
    </div>

    <!-- Handler/Teacher Panel -->
    <div id="teacher-panel" class="teacher-drawer p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8 border-b border-gold/20 pb-4">
            <h2 class="font-elegant text-2xl text-gold tracking-widest uppercase"><i class="fa-solid fa-ear-listen mr-3"></i> Handler Comms</h2>
            <button onclick="toggleTeacherPanel()" class="text-muted hover:text-gold transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <textarea id="teacher-notes" class="flex-1 bg-surface border border-gold/10 p-5 font-code text-sm text-silver focus:outline-none focus:border-gold/50 resize-none mb-8 rounded shadow-inner" placeholder="> Input mission notes, agent errors, and intelligence updates here..."></textarea>
        <div class="space-y-4">
            <button onclick="triggerPraise('Flawless Execution', 'Grammar Approved')" class="w-full py-4 border border-success text-success hover:bg-success hover:text-white transition-all font-elegant font-bold tracking-widest uppercase rounded">Approve Syntax</button>
        </div>
    </div>

    <!-- Header / HUD -->
    <header class="h-24 glass-panel border-b border-gold/10 z-100 flex items-center justify-between px-8 shrink-0 relative z-40">
        <div class="flex items-center gap-8">
            <div id="health-bar" class="flex gap-3 text-xl text-gold">
                <i class="fa-solid fa-shield-halved" id="hp-1"></i>
                <i class="fa-solid fa-shield-halved" id="hp-2"></i>
                <i class="fa-solid fa-shield-halved" id="hp-3"></i>
            </div>
            <div class="flex flex-col border-l border-gold/20 pl-6">
                <span class="font-code text-[9px] text-muted uppercase tracking-[0.3em]">Clearance Level</span>
                <span id="xp-counter" class="font-elegant text-2xl text-gold tracking-widest leading-none">0000</span>
            </div>
        </div>
        <div class="absolute left-1/2 -translate-x-1/2 text-center flex flex-col items-center">
            <i class="fa-solid fa-chess-knight text-gold/50 text-2xl mb-1"></i>
            <p class="font-elegant text-lg text-gold font-bold tracking-[0.4em] uppercase">WOLF LABS</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTeacherPanel()" class="mi6-btn px-6 py-2 rounded text-xs"><i class="fa-solid fa-satellite-dish mr-2"></i> Comms</button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="arena" class="flex-1 relative overflow-y-auto overflow-x-hidden flex items-center justify-center p-4 md:p-8">
        <div id="slide-container" class="w-full max-w-6xl transition-all duration-500 relative z-10 h-full flex flex-col justify-center pb-20"></div>
    </main>

    <!-- Footer Navigation -->
    <footer class="h-20 glass-panel border-t border-gold/10 z-100 flex items-center justify-between px-8 shrink-0 relative z-40">
        <div class="w-1/3">
            <div class="w-full bg-surface h-1 rounded-full overflow-hidden border border-gold/10">
                <div id="progress-fill" class="h-full bg-gold transition-all duration-500 shadow-[0_0_10px_rgba(212,175,55,0.8)]" style="width: 0%"></div>
            </div>
        </div>
        <div class="w-1/3 text-center">
            <span id="page-counter" class="font-code text-muted text-xs tracking-[0.4em] uppercase">FILE 01 / 20</span>
        </div>
        <div class="w-1/3 flex justify-end gap-4 items-center">
            <!-- Integrated Teacher Tools -->
            <button onclick="toggleFullscreen()" class="w-12 h-12 flex items-center justify-center text-muted border border-transparent rounded hover:bg-gold/10 hover:text-gold transition-all mr-2" title="Toggle Fullscreen">
                <i class="fa-solid fa-expand text-xl"></i>
            </button>
            
            <div class="w-px h-8 bg-gold/20 mx-2"></div>
            
            <!-- Slide Nav -->
            <button onclick="nav(-1)" id="btn-prev" class="w-12 h-12 flex items-center justify-center text-muted border border-gold/20 rounded hover:border-gold hover:text-gold disabled:opacity-20 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
            <button onclick="nav(1)" id="btn-next" class="w-12 h-12 flex items-center justify-center text-bgBase bg-gold rounded hover:scale-105 shadow-[0_0_15px_rgba(212,175,55,0.3)] disabled:opacity-20 transition-all"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </footer>

    <!-- Global Modals -->
    <div id="intel-modal" class="fixed inset-0 z-[1000] bg-bgBase/90 backdrop-blur-sm hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="glass-panel gold-border p-10 max-w-2xl w-full mx-4 rounded-sm relative transform scale-95 transition-transform duration-300" id="intel-modal-content">
            <button onclick="closeIntel()" class="absolute top-6 right-6 text-muted hover:text-gold transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <p class="font-code text-gold text-xs tracking-[0.3em] uppercase mb-2 border-b border-gold/20 inline-block pb-1">Decrypted Term</p>
            <h2 id="im-title" class="font-elegant text-4xl text-silver mb-4 uppercase tracking-widest"></h2>
            <p id="im-def" class="font-ui text-lg text-muted mb-8 leading-relaxed"></p>
            <div class="bg-surface border border-gold/10 p-6 rounded relative overflow-hidden">
                <i class="fa-solid fa-microphone-lines absolute -right-4 -bottom-4 text-7xl text-gold/5"></i>
                <p class="font-code text-xs text-muted tracking-widest uppercase mb-3">Handler Prompt (Speak)</p>
                <p id="im-q" class="font-ui text-xl text-silver font-medium mb-2"></p>
                <p id="im-starter" class="font-elegant text-gold text-2xl italic"></p>
            </div>
        </div>
    </div>

    <script>
        // --- STATE & CORE ---
        let state = { step: 0, hp: 3, xp: 0 };

        // Helper to trigger positive feedback
        function triggerPraise(title, msg) {
            const notif = document.getElementById('notification-card');
            document.getElementById('notif-title').innerText = title;
            document.getElementById('notif-msg').innerText = msg;
            state.xp += 150;
            updateHUD();
            
            notif.classList.remove('opacity-0', '-translate-y-full');
            notif.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                notif.classList.remove('opacity-100', 'translate-y-0');
                notif.classList.add('opacity-0', '-translate-y-full');
            }, 2500);
        }

        // Helper to trigger negative feedback
        function takeDamage(msg) {
            if(state.hp > 0) state.hp--;
            const overlay = document.getElementById('damage-overlay');
            overlay.classList.replace('opacity-0', 'opacity-100');
            document.getElementById('arena').classList.add('damage-shake');
            updateHUD();
            setTimeout(() => { 
                overlay.classList.replace('opacity-100', 'opacity-0'); 
                document.getElementById('arena').classList.remove('damage-shake'); 
            }, 400);
            if(msg) alert("HANDLER: " + msg);
        }

        function updateHUD() {
            for(let i=1; i<=3; i++) {
                document.getElementById('hp-' + i).style.opacity = (i <= state.hp) ? "1" : "0.2";
            }
            document.getElementById('xp-counter').innerText = String(state.xp).padStart(4, '0');
            document.getElementById('page-counter').innerText = "FILE " + String(state.step + 1).padStart(2, '0') + " / " + slides.length;
            document.getElementById('progress-fill').style.width = String(((state.step + 1) / slides.length) * 100) + "%";
            
            document.getElementById('btn-prev').disabled = state.step === 0;
            document.getElementById('btn-next').disabled = state.step === slides.length - 1;
        }

        function toggleTeacherPanel() { document.getElementById('teacher-panel').classList.toggle('open'); }

        // --- MECHANICS ---
        function openIntel(title, def, q, starter) {
            const modal = document.getElementById('intel-modal');
            const content = document.getElementById('intel-modal-content');
            document.getElementById('im-title').innerText = title;
            document.getElementById('im-def').innerText = def;
            document.getElementById('im-q').innerText = q;
            document.getElementById('im-starter').innerText = starter;
            
            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before opacity transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeIntel() {
            const modal = document.getElementById('intel-modal');
            const content = document.getElementById('intel-modal-content');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function checkMCQ(btn, isCorrect) {
            const parent = btn.parentElement;
            if(parent.dataset.answered === "true") return;
            
            if(isCorrect) {
                btn.classList.add('bg-success/20', 'border-success', 'text-success');
                parent.dataset.answered = "true";
                triggerPraise('Syntax Verified', 'Grammar is correct.');
                setTimeout(() => nav(1), 1500);
            } else {
                btn.classList.add('bg-danger/20', 'border-danger', 'text-danger');
                takeDamage('Incorrect syntax. Review the intel.');
            }
        }

        function fixBug(el, correctWord) {
            if(el.classList.contains('solved')) return;
            el.innerText = correctWord;
            el.classList.add('solved');
            triggerPraise('Bug Patched', 'Syntax corrected successfully.');
        }

        function handleSlot(btn, isCorrect) {
            const parent = btn.parentElement;
            if(parent.dataset.answered === "true") return;

            if(isCorrect) {
                btn.classList.add('bg-success/20', 'border-success', 'text-success');
                const slot = document.getElementById('active-slot');
                if(slot) {
                    slot.innerText = btn.innerText;
                    slot.classList.replace('border-gold', 'border-success');
                    slot.classList.replace('text-transparent', 'text-success');
                }
                parent.dataset.answered = "true";
                triggerPraise('Slot Filled', 'Sentence complete.');
                setTimeout(() => nav(1), 1500);
            } else {
                btn.classList.add('bg-danger/20', 'border-danger', 'text-danger');
                takeDamage('Incorrect word selection.');
            }
        }

        let decoderState = { blocks: [], target: "" };
        function initDecoder(targetSentence) {
            decoderState.blocks = [];
            decoderState.target = targetSentence;
            document.getElementById('decoder-ans').innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-muted font-code text-sm uppercase opacity-50">Construct Syntax Here</div>';
        }
        function moveBlock(btn) {
            const ansArea = document.getElementById('decoder-ans');
            if(btn.parentElement.id === 'decoder-bank') {
                if(ansArea.innerHTML.includes('Construct Syntax Here')) ansArea.innerHTML = '';
                ansArea.appendChild(btn);
                decoderState.blocks.push(btn.innerText);
            } else {
                document.getElementById('decoder-bank').appendChild(btn);
                decoderState.blocks = decoderState.blocks.filter(b => b !== btn.innerText);
                if(decoderState.blocks.length === 0) {
                    ansArea.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-muted font-code text-sm uppercase opacity-50">Construct Syntax Here</div>';
                }
            }
        }
        function checkDecoder() {
            const currentStr = decoderState.blocks.join(" ");
            if(currentStr === decoderState.target) {
                triggerPraise('Decryption Successful', 'Message reconstructed.');
                setTimeout(() => nav(1), 2000);
            } else {
                takeDamage('Sequence incorrect. Reorganize the blocks.');
            }
        }

        // --- SLIDE TEMPLATES ---
        const S_Cover = (title, sub, desc) => `
            <div class="text-center fade-in flex flex-col items-center">
                <i class="fa-solid fa-chess-knight text-7xl text-gold mb-8"></i>
                <h1 class="font-elegant text-5xl md:text-7xl text-silver tracking-[0.2em] uppercase mb-6">${title}</h1>
                <h2 class="font-elegant text-2xl text-gold tracking-[0.4em] uppercase mb-10 font-bold border-b border-gold/30 pb-3 inline-block">${sub}</h2>
                <div class="glass-panel p-8 max-w-xl mx-auto border-l-4 border-l-gold">
                    <p class="font-ui text-lg text-muted leading-relaxed">${desc}</p>
                </div>
            </div>`;

        const S_IntelTerminal = (title, textHTML, promptQ, promptA) => `
            <div class="w-full max-w-4xl mx-auto fade-in">
                <p class="font-code text-center text-gold tracking-[0.3em] text-sm mb-4 uppercase"><i class="fa-solid fa-terminal mr-2"></i> Intercepted Comm</p>
                <div class="w-full glass-panel gold-border rounded-sm overflow-hidden mb-10">
                    <div class="bg-surface/80 p-4 flex items-center gap-3 border-b border-gold/10">
                        <i class="fa-solid fa-lock text-muted"></i>
                        <span class="font-code text-muted text-xs tracking-widest uppercase">${title}</span>
                    </div>
                    <div class="p-10 font-elegant text-3xl text-silver leading-relaxed">
                        ${textHTML}
                    </div>
                </div>
                ${promptQ ? `
                <div class="glass-panel p-8 border-l-4 border-l-gold relative overflow-hidden">
                    <i class="fa-solid fa-walkie-talkie absolute -right-2 -bottom-2 text-6xl text-gold/10"></i>
                    <p class="font-code text-gold text-xs tracking-widest uppercase mb-3">Handler Interrogation</p>
                    <p class="font-ui text-xl text-silver mb-2 font-medium">"${promptQ}"</p>
                    <p class="font-elegant text-gold text-2xl italic">"${promptA}"</p>
                </div>` : ''}
            </div>`;

        const S_Grammar = (title, rule, examples) => `
            <div class="w-full max-w-5xl mx-auto fade-in text-center flex flex-col items-center justify-center">
                <p class="font-code text-gold tracking-[0.3em] text-sm mb-4 uppercase"><i class="fa-solid fa-book-journal-whills mr-2"></i> Agency Protocol</p>
                <h2 class="font-elegant text-4xl text-silver mb-12 tracking-widest uppercase">${title}</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full mb-12">
                    ${examples.map(ex => `
                        <div class="glass-panel gold-border p-8 text-left rounded-sm relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-1 h-full bg-gold opacity-50"></div>
                            <p class="font-code text-muted text-xs tracking-[0.3em] uppercase mb-4">${ex.label}</p>
                            <p class="font-elegant text-3xl text-silver">${ex.text}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="glass-panel p-6 border-l-4 border-l-gold w-full text-left">
                    <p class="font-ui text-lg text-muted leading-relaxed"><i class="fa-solid fa-circle-info text-gold mr-3"></i> <strong>RULE:</strong> ${rule}</p>
                </div>
            </div>`;

        const S_MCQ = (question, options) => `
            <div class="w-full max-w-3xl mx-auto fade-in text-center">
                <p class="font-code text-gold tracking-[0.3em] text-sm mb-4 uppercase"><i class="fa-solid fa-shield-halved mr-2"></i> Security Check</p>
                <h2 class="font-elegant text-4xl text-silver mb-12 leading-snug">${question}</h2>
                <div class="space-y-4 text-left" data-answered="false">
                    ${options.map((opt) => `
                        <button onclick="checkMCQ(this, ${opt.c})" class="w-full glass-panel gold-border p-6 rounded-sm font-ui text-2xl text-silver hover:bg-gold/5 transition-colors flex items-center gap-6 group">
                            <div class="w-6 h-6 rounded-full border-2 border-muted group-hover:border-gold flex items-center justify-center transition-colors">
                                <div class="w-2 h-2 rounded-full bg-gold opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            </div>
                            ${opt.txt}
                        </button>
                    `).join('')}
                </div>
            </div>`;

        const S_BugHunter = (instruction, sentenceHTML, correctWord) => `
            <div class="w-full max-w-4xl mx-auto fade-in text-center flex flex-col items-center">
                <p class="font-code text-danger tracking-[0.3em] text-sm mb-4 uppercase animate-pulse"><i class="fa-solid fa-bug mr-2"></i> Syntax Error Detected</p>
                <h2 class="font-elegant text-3xl text-silver mb-12 tracking-widest uppercase">${instruction}</h2>
                
                <div class="glass-panel p-16 rounded-sm w-full mb-12 text-center border-t-4 border-t-danger relative overflow-hidden">
                    <i class="fa-solid fa-triangle-exclamation absolute text-[150px] text-danger/5 -right-10 -bottom-10"></i>
                    <p class="font-elegant text-5xl text-silver leading-[1.5] relative z-10">${sentenceHTML}</p>
                </div>
                <p class="font-code text-muted text-sm tracking-widest uppercase">Click the red word to deploy patch.</p>
            </div>
            ${setTimeout(() => {
                document.querySelectorAll('.bug-word').forEach(el => {
                    el.addEventListener('click', (e) => fixBug(e.target, correctWord));
                });
            }, 100) ? '' : ''}`;

            const starter = document.getElementById('roulette-starter');

                {txt: "He travels to Paris.", c: true},
                {txt: "He travel to Paris.", c: false},
                {txt: "He doesn't travel.", c: false}
            ]),
            // 15

            // 16

        // --- RENDER PIPELINE ---
        function initApp() {
            document.getElementById('loading-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                render();
            }, 1000);
        }

        function nav(dir) {
            let n = state.step + dir;
            if(n >= 0 && n < slides.length) {
                state.step = n;
                render();
            }
        }

        function render() {
            const container = document.getElementById('slide-container');
            container.innerHTML = '';
            updateHUD();
            // Render current slide HTML
            setTimeout(() => {
                container.innerHTML = slides[state.step]();
            }, 50);
        }

    </script>


    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        let isGlobalMuted = false;
        function toggleMute() {
            isGlobalMuted = !isGlobalMuted;
            const btn = document.getElementById('mute-btn');
            if(isGlobalMuted) {
                btn.innerHTML = '<i class="fa-solid fa-volume-xmark text-danger"></i>';
                btn.classList.add('border-danger/30');
                btn.classList.remove('border-gold/30');
            } else {
                btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                btn.classList.add('border-gold/30');
                btn.classList.remove('border-danger/30');
            }
        }

        // Mute logic hook
        const originalPraise = triggerPraise;
        triggerPraise = (t, d) => { if(!isGlobalMuted) originalPraise(t, d); }
        const originalDmg = takeDamage;
        takeDamage = (m) => { if(!isGlobalMuted) originalDmg(m); }
    </script>
